<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khaled | Welcome</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            background: #020617;
            padding: 32px 40px;
            border-radius: 18px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.8);
            text-align: center;
            max-width: 420px;
            width: 90%;
            border: 1px solid rgba(148, 163, 184, 0.3);
        }

        h1 {
            margin-bottom: 8px;
        }

        p {
            margin-top: 0;
            margin-bottom: 24px;
            color: #cbd5f5;
        }

        a.main-btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 999px;
            background: #22c55e;
            color: #020617;
            font-weight: 600;
            text-decoration: none;
            box-shadow: 0 10px 25px rgba(34, 197, 94, 0.35);
            transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
        }

        a.main-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 35px rgba(34, 197, 94, 0.45);
            background: #16a34a;
        }

        a.main-btn:active {
            transform: translateY(0);
            box-shadow: 0 8px 18px rgba(34, 197, 94, 0.35);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>welcome to my page 👋</h1>
        <p>Nice to meet you! This is a simple welcome page.</p>

        <a class="main-btn" href="second_screen.html">
            Enter to my About Me page
        </a>
    </div>
</body>
</html>
